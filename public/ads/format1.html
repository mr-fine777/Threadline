<!DOCTYPE html>
<html>
<head>
<style>

body {
  margin: 0;
  overflow-y: hidden;
  overflow-x: hidden;
}

iframe {
  position: fixed;
  top: 0;
  left: 0;
}

.hidden {
  display: none;
}
  
</style>
</head>

<body>

<div id="frame" style="width: 300px;margin: auto;z-index: 99998;height: auto">
  <iframe data-aa='2435262' src='//ad.a-ads.com/2435262/?size=300x250'
    style='border:0; padding:0; width:300px; height:250px; overflow:hidden;display: block;margin: auto'>
  </iframe>
</div>

<ins id="altAd" data-tr-zone="01KPYCJMXZQPXS5VBY1ZK325AX">
  <script type="text/javascript" async src="https://s.ad.twinrdengine.com/adlib.js"></script>
</ins>

<script>
// --- Randomly choose which ad to show ---
const showIframe = Math.random() < 0.5;

const frameDiv = document.getElementById("frame");
const insAd = document.getElementById("altAd");

if (showIframe) {
  insAd.classList.add("hidden");
} else {
  frameDiv.classList.add("hidden");
}

// --- Random refresh between 30–60 seconds ---
const min = 30000; // 30 seconds
const max = 60000; // 60 seconds

const randomTime = Math.floor(Math.random() * (max - min + 1)) + min;

setTimeout(() => {
  location.reload();
}, randomTime);
</script>

</body>
</html>
